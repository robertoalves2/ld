<script>
  async function carregarEvangelho() {
    try {
      const feedUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://aliturgia.com/feed/");
      const feedRes = await fetch(feedUrl);
      const feedData = await feedRes.json();
      const feedText = feedData.contents;

      const parser = new DOMParser();
      const xml = parser.parseFromString(feedText, "application/xml");
      const items = [...xml.querySelectorAll("item")];

      const agora = new Date(); // hora local do usuário (inclui fuso)
      const timezoneOffset = 3 * 60 * 60 * 1000; // +03:00 em ms (Brasília)

      let artigoEscolhido = null;

      for (const item of items) {
        const title = item.querySelector("title")?.textContent || "";
        const link = item.querySelector("link")?.textContent || "";
        const pubDateText = item.querySelector("pubDate")?.textContent || "";

        const pubDateUTC = new Date(pubDateText);
        const pubDateBR = new Date(pubDateUTC.getTime() + timezoneOffset); // aplicar horário de Brasília

        if (pubDateBR <= agora) {
          artigoEscolhido = { title, link };
          break;
        }
      }

      if (!artigoEscolhido) throw new Error("Nenhum post válido encontrado.");

      document.getElementById("titulo").textContent = artigoEscolhido.title;

      const postRes = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(artigoEscolhido.link));
      const postData = await postRes.json();
      const postHtml = postData.contents;

      const htmlParser = new DOMParser();
      const postDoc = htmlParser.parseFromString(postHtml, "text/html");
      const article = postDoc.querySelector("article");

      if (!article) throw new Error("Artigo não encontrado.");

      let html = article.innerHTML;

      // Corta o conteúdo a partir de "Evangelho"
      let startIndex = html.indexOf("Evangelho");
      if (startIndex === -1) throw new Error("Seção 'Evangelho' não encontrada.");

      let recorte = html.slice(startIndex);

      // Remove tudo depois de "Share:" ou "Partilhar:"
      const shareIndex = recorte.search(/(Share:|Partilhar:)/i);
      if (shareIndex !== -1) {
        recorte = recorte.slice(0, shareIndex);
      }

      document.getElementById("evangelho").innerHTML = recorte.trim();

    } catch (error) {
      console.error("Erro:", error);
      document.getElementById("titulo").textContent = "Erro ao carregar";
      document.getElementById("evangelho").textContent = "Não foi possível carregar o conteúdo.";
    }
  }

  carregarEvangelho();
</script>
