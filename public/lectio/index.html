<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lectio Divina – Evangelho do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      max-width: 800px;
      margin: auto;
      padding: 2em;
      color: #333;
    }
    h1, h2 {
      text-align: center;
    }
    #evangelho {
      background: #fff;
      padding: 1.5em;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    footer {
      margin-top: 3em;
      text-align: center;
      font-size: 0.9em;
      color: #888;
    }
    a {
      color: #3b5998;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Lectio Divina</h1>
  <h2 id="titulo">Carregando título...</h2>
  <div id="evangelho">Carregando evangelho...</div>

  <footer>
    Fonte: <a href="https://aliturgia.com" target="_blank">aliturgia.com</a><br>
    Desenvolvido por <a href="https://tecinova.top" target="_blank">tecinova.top</a>
  </footer>
<script>
  async function carregarEvangelho() {
    try {
      console.log("Iniciando fetch do RSS via proxy...");
      const feedUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://aliturgia.com/feed/");
      const feedRes = await fetch(feedUrl);
      const feedData = await feedRes.json();
      console.log("RSS fetchado:", feedData);

      const parser = new DOMParser();
      const xml = parser.parseFromString(feedData.contents, "application/xml");
      const items = [...xml.querySelectorAll("item")];
      console.log("Itens encontrados no feed:", items.length);

      const agora = new Date();
      const offsetBR = 3 * 60 * 60 * 1000;
      let artigo = null;

      for (const item of items) {
        const title = item.querySelector("title")?.textContent;
        const link = item.querySelector("link")?.textContent;
        const pub = item.querySelector("pubDate")?.textContent;
        const pubBR = new Date(new Date(pub).getTime() + offsetBR);

        console.log("Post:", title, "|", link, "| PubDate BR:", pubBR.toString());

        if (pubBR <= agora) {
          artigo = { title, link };
          console.log("-> Escolhido:", artigo);
          break;
        }
      }

      if (!artigo) throw new Error("🛑 Nenhum post válido até agora.");

      document.getElementById("titulo").textContent = artigo.title;

      console.log("Buscando HTML do post:", artigo.link);
      const postRes = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(artigo.link));
      const postData = await postRes.json();
      console.log("HTML do post recebido:", postData);

      const postDoc = new DOMParser().parseFromString(postData.contents, "text/html");
      const articleElem = postDoc.querySelector("article");
      if (!articleElem) throw new Error("🛑 <article> não encontrado no post.");

      const htmlOriginal = articleElem.innerHTML;
      const textoLimpo = articleElem.textContent;
      const trechoEvangelho = textoLimpo.indexOf("Evangelho");

      if (trechoEvangelho === -1) throw new Error("🛑 Palavra 'Evangelho' não encontrada no texto.");

      // Localizar no HTML a posição equivalente
      const regex = /Evangelho[^<]{0,80}/i;
      const match = htmlOriginal.match(regex);
      if (!match) throw new Error("🛑 Não foi possível localizar 'Evangelho' no HTML.");

      const inicio = htmlOriginal.indexOf(match[0]);
      let recorte = htmlOriginal.slice(inicio);

      // Cortar após Share/Partilhar
      const fim = recorte.search(/(Share:|Partilhar:)/i);
      if (fim !== -1) recorte = recorte.slice(0, fim);

      document.getElementById("evangelho").innerHTML = recorte.trim();
      console.log("✅ Evangelho extraído com sucesso.");

    } catch (err) {
      console.error("Erro no script:", err);
      document.getElementById("titulo").textContent = "Erro ao carregar";
      document.getElementById("evangelho").textContent = "Não foi possível carregar o conteúdo.";
    }
  }

  carregarEvangelho();
</script>

</body>
</html>
