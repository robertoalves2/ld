<script>
  async function depurarRSS() {
    const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://aliturgia.com/feed/");
    console.log("🔄 Buscando via proxy:", proxyUrl);
    const res = await fetch(proxyUrl);
    const text = await res.text();
    console.log("📦 Conteúdo do feed (completo):", text);
    document.body.innerHTML = "<pre>"+text.replace(/&/g,"&amp;")+"</pre>";
  }
  depurarRSS();
</script>
