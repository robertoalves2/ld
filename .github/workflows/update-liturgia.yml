name: Atualizar Evangelho Diário

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install node-fetch@3 jsdom

      - run: node public/lectio/fetch-liturgia.mjs

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/lectio/evangelho.html
          git commit -m "Atualiza evangelho do dia"
          git push || true
