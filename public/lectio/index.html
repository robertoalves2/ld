<body>
  <h1 id="titulo">Carregando título...</h1>

  <div id="nav-botoes">
    <button onclick="navegar(1)" id="proximo">&larr; Dia anterior</button>
  </div>

  <div id="evangelho">Carregando evangelho...</div>

  <div style="margin-top: 1em; text-align: center">
    <button onclick="compartilhar()">Compartilhar</button>
  </div>

  <div style="margin-top:2em;text-align:center">

    <a href="https://ofertas.tecinova.top/" target="_blank">
      <img src="banner_ofertas exclusivas.webp" alt="Confira ofertas exclusivas" style="max-width:100%;height:auto;border-radius:8px;box-shadow:0 0 5px rgba(0,0,0,0.1)" />

  <footer>
    Fonte: aliturgia.com<br>
    <a href="https://liturgiadiaria.top/" target="_blank">&copy; 2025 Liturgia Diária - Todos os direitos reservados</a>
  </footer>

  <script>
    let indexAtual = 0;
    let posts = [];

    async function carregarFeed() {
      try {
        const feedUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://aliturgia.com/feed/");
        const feedRes = await fetch(feedUrl);
        const feedData = await feedRes.json();
        const parser = new DOMParser();
        const xml = parser.parseFromString(feedData.contents, "application/xml");
        posts = [...xml.querySelectorAll("item")].map(item => ({
          title: item.querySelector("title")?.textContent || "",
          link: item.querySelector("link")?.textContent || ""
        }));
        exibirPost(indexAtual);
      } catch (e) {
        console.error("Erro ao carregar o feed:", e);
        document.getElementById("evangelho").innerHTML = "Erro ao carregar o conteúdo.";
      }
    }

    async function exibirPost(i) {
      if (i < 0 || i >= posts.length) return;
      indexAtual = i;
      const { title, link } = posts[i];
      document.getElementById("titulo").textContent = title;
      const proxiedUrl = "https://api.allorigins.win/get?url=" + encodeURIComponent(link);
      try {
        const res = await fetch(proxiedUrl);
        const data = await res.json();
        const postDoc = new DOMParser().parseFromString(data.contents, "text/html");
        const article = postDoc.querySelector("article");
        if (!article) throw new Error("<article> não encontrado");

        const nodes = [...article.querySelectorAll("h2, h3, strong, p")];
        let startIndex = nodes.findIndex(n => /^Evangelho/i.test(n.textContent.trim()));
        if (startIndex === -1) throw new Error("'Evangelho' não encontrado");

        let recorteHTML = "";
        const textoUsado = new Set();
        for (let i = startIndex; i < nodes.length; i++) {
          const texto = nodes[i].textContent.trim();
          if (!texto || textoUsado.has(texto)) continue;
          if (/Share:|Partilhar:/i.test(texto)) break;
          if (/^compreender a palavra$|^meditar a palavra$|^rezar a palavra$|^compromisso$/i.test(texto)) continue;
          recorteHTML += nodes[i].outerHTML;
          textoUsado.add(texto);
        }

        recorteHTML = recorteHTML
          .replace(/(<[^>]*>\s*)?(compreender a palavra)(\s*<[^>]*>)?/gi, '<h3>💡 Compreender a Palavra</h3>')
          .replace(/(<[^>]*>\s*)?(meditar a palavra)(\s*<[^>]*>)?/gi, '<h3>🪔 Meditar a Palavra</h3>')
          .replace(/(<[^>]*>\s*)?(rezar a palavra)(\s*<[^>]*>)?/gi, '<h3>🙏 Rezar a Palavra</h3>')
          .replace(/(<[^>]*>\s*)?(compromisso)(\s*<[^>]*>)?/gi, '<h3>📌 Compromisso</h3>');

        document.getElementById("evangelho").innerHTML = recorteHTML || "Conteúdo não encontrado.";

      } catch (e) {
        console.error(e);
        document.getElementById("evangelho").innerHTML = "Erro ao carregar o conteúdo.";
      }
    }

    function navegar(delta) {
      const novoIndex = indexAtual + delta;
      if (novoIndex >= 0 && novoIndex < posts.length) {
        exibirPost(novoIndex);
      }
    }

    function compartilhar() {
      const titulo = document.getElementById("titulo").textContent;
      const conteudo = document.getElementById("evangelho").innerText;
      const texto = `📖 *${titulo}*

${conteudo.replace(/compreender a palavra/gi, '💡 Compreender a Palavra').replace(/meditar a palavra/gi, '🪔 Meditar a Palavra').replace(/rezar a palavra/gi, '🙏 Rezar a Palavra').replace(/compromisso/gi, '📌 Compromisso')}

🙏 Acesse: www.liturgiadiaria.top/lectio`;
      const fallback = () => {
        navigator.clipboard.writeText(texto)
          .then(() => alert("📋 Conteúdo copiado para a área de transferência!"))
          .catch(() => alert("Não foi possível copiar. Copie manualmente."));
      };

      if (window.isSecureContext && navigator.canShare && navigator.canShare({ text: texto })) {
        navigator.share({
          title: titulo,
          text: texto,
          url: location.href
        }).catch(fallback);
      } else {
        fallback();
      }
    }

    carregarFeed();
  </script>
</body>
