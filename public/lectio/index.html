<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Lectio Divina – Evangelho do Dia</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      max-width: 800px;
      margin: auto;
      padding: 2em;
      color: #333;
    }
    h1, h2 {
      text-align: center;
    }
    #evangelho {
      background: #fff;
      padding: 1.5em;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    footer {
      margin-top: 3em;
      text-align: center;
      font-size: 0.9em;
      color: #888;
    }
    a {
      color: #3b5998;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Lectio Divina</h1>
  <h2 id="titulo">Carregando título...</h2>
  <div id="evangelho">Carregando evangelho...</div>

  <footer>
    Fonte: <a href="https://aliturgia.com" target="_blank">aliturgia.com</a><br>
    Desenvolvido por <a href="https://tecinova.top" target="_blank">tecinova.top</a>
  </footer>

  <script>
    async function carregarEvangelho() {
      try {
        const res = await fetch('https://aliturgia.com/feed/');
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "application/xml");
        const items = [...xml.querySelectorAll("item")];

        let titulo = "Evangelho do Dia";
        let evangelhoHtml = "Nenhum conteúdo encontrado.";

        for (const item of items) {
          const contentEncoded = item.getElementsByTagName("content:encoded")[0]?.textContent || "";
          const title = item.querySelector("title")?.textContent || "";

          if (contentEncoded.includes("Evangelho")) {
            const indexInicio = contentEncoded.indexOf("Evangelho");
            const trecho = contentEncoded.slice(indexInicio).trim();

            // Limpeza opcional
            const final = trecho.replace(/<!\[CDATA\[|\]\]>/g, "");

            titulo = title;
            evangelhoHtml = final;
            break; // usa o mais recente com "Evangelho"
          }
        }

        document.getElementById("titulo").textContent = titulo;
        document.getElementById("evangelho").innerHTML = evangelhoHtml;
      } catch (e) {
        document.getElementById("titulo").textContent = "Erro ao carregar";
        document.getElementById("evangelho").textContent = "Não foi possível carregar o conteúdo.";
        console.error(e);
      }
    }

    carregarEvangelho();
  </script>
</body>
</html>
